services:
  postgres:
    image: postgres:16-alpine
    container_name: english_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: english_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - english_agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d english_agent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  english_agent_pgdata:

